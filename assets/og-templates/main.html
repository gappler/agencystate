<!DOCTYPE html>
<html lang="en">
<head>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 1200px;
            height: 630px;
            overflow: hidden;
        }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: #FAF9F7;
            color: #1A1A1A;
            -webkit-font-smoothing: antialiased;

        }
        .wordmark {
            font-size: 140px;
            letter-spacing: -0.03em;
            line-height: 1;
            color: #1A1A1A;

<body>
    <div class="wordmark"><span class="bold">agency</span><span class="regular">state</span></div>
